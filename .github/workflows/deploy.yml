name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/*'
      - 'branch*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Run black check
      run: |
        black --check --verbose --diff .

    - name: Run isort check
      run: |
        isort --check-only --diff .

    - name: Run flake8
      run: |
        flake8 . --exclude=.venv,venv,env,__pycache__,migrations --count --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:14.6-alpine
        env:
          POSTGRES_DB: lms_db
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: lms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage

    - name: Run tests with coverage
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: lms_db
        DB_USER: lms_user
        DB_PASSWORD: lms_password
      run: |
        coverage run manage.py test
        coverage report --fail-under=50
  build:
    runs-on: ubuntu-latest
    needs: test
    # Временно закомментировано ограничение по веткам
    # if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t habits-tracker:latest .

      - name: Test Docker image
        run: |
          docker run --rm --entrypoint python habits-tracker:latest -c "import django; print('Django OK')"

      # Docker Hub push (будет пропущен, если секреты не заданы)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Push Docker image
        run: |
          docker tag habits-tracker:latest ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/habits-tracker:latest
        continue-on-error: true
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << 'ENDSSH'
          cd /var/www/habits-tracker || exit 1
          git pull origin ${{ github.ref_name }}
          source venv/bin/activate
          pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput
          sudo systemctl restart gunicorn
          sudo systemctl reload nginx
        ENDSSH

    - name: Verify deployment
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
      run: |
        curl -f http://$SERVER_IP/api/docs/ || exit 1
        echo "✅ Deployment successful!"