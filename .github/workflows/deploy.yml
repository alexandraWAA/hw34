name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Добавляем ручной запуск для тестирования
  workflow_dispatch:

# Добавляем permissions
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with coverage
      run: |
        pip install coverage
        coverage run manage.py test
        coverage report --fail-under=50

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run black check
      uses: psf/black@stable
      with:
        options: "--check --verbose"
        src: "./"

    - name: Run isort check
      uses: isort/isort-action@master
      with:
        configuration: "--check-only --diff"

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    # Запускаем только при push в main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t habits-tracker:latest .

    - name: Test Docker image
      run: |
        docker run --rm habits-tracker:latest python manage.py check

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Запускаем только при push в main/master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: http://${{ secrets.SERVER_IP }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

    - name: Deploy to server
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'ENDSSH'
          cd /var/www/habits-tracker || exit 1
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput
          sudo systemctl restart gunicorn
          sudo systemctl reload nginx
        ENDSSH

    - name: Verify deployment
      run: |
        curl -f http://${{ secrets.SERVER_IP }}/api/docs/ || exit 1
        echo "✅ Deployment successful!"
