version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: habits_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-habits_db}
      POSTGRES_USER: ${DB_USER:-habits_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-habits_password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - habits_network_dev
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: habits_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    networks:
      - habits_network_dev

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: habits_web_dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=1
      - DB_HOST=db
      - REDIS_HOST=redis
    networks:
      - habits_network_dev
    env_file:
      - .env

networks:
  habits_network_dev:
    driver: bridge

volumes:
  postgres_data_dev:
    name: habits_postgres_data_dev
  redis_data_dev:
    name: habits_redis_data_dev