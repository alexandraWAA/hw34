version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: habits_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-habits_db}
      POSTGRES_USER: ${DB_USER:-habits_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-habits_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-habits_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habits_network
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: habits_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habits_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habits_web
    restart: unless-stopped
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=0
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - habits_network
    env_file:
      - .env

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habits_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - habits_network
    env_file:
      - .env

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habits_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - habits_network
    env_file:
      - .env

  nginx:
    image: nginx:1.25-alpine
    container_name: habits_nginx
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - habits_network

networks:
  habits_network:
    driver: bridge

volumes:
  postgres_data:
    name: habits_postgres_data
  redis_data:
    name: habits_redis_data
  static_volume:
    name: habits_static_volume
  media_volume:
    name: habits_media_volume