bind = "unix:/var/www/habits-tracker/habits-tracker.sock"
workers = 3
worker_class = "sync"
worker_connections = 1000
timeout = 30
max_requests = 1000
max_requests_jitter = 100
preload_app = True

# Logging
accesslog = "/var/www/habits-tracker/logs/access.log"
errorlog = "/var/www/habits-tracker/logs/error.log"
loglevel = "info"